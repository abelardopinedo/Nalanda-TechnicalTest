services:
    laravel.test:
        build:
            context: './docker/8.3'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.3/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            # Defaulted to 1337 (the Dockerfile's baked-in `sail` uid, see
            # the `queue` service below for why) so a one-off
            # `docker compose run laravel.test <cmd>` (which overrides the
            # command, taking start-container's `gosu $WWWUSER` branch)
            # doesn't fail with an empty WWWUSER.
            WWWUSER: '${WWWUSER:-1337}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
    migrate:
        image: 'sail-8.3/app'
        environment:
            WWWUSER: '${WWWUSER:-1337}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
        # `migrate` (not `migrate:fresh`): idempotent, only applies pending
        # migrations, safe to run on every `docker compose up` without
        # wiping data on a restart. This is a one-shot job, not a
        # long-running service — it's expected to exit 0 and stop; the
        # other services wait on that via `service_completed_successfully`
        # instead of racing the schema.
        #
        # db:seed (DatabaseSeeder: EvaluatorSeeder + CandidacySeeder — 3
        # evaluadores, una candidatura por etapa) is NOT idempotent the way
        # migrate is: CandidacySeeder inserts fresh rows every call, so
        # re-running `docker compose up` after data already exists will add
        # duplicate sample candidacies rather than a clean no-op.
        command: sh -c "php artisan migrate --force && php artisan db:seed --force"
    queue:
        build:
            context: './docker/8.3'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP:-1000}'
        image: 'sail-8.3/app'
        environment:
            # Defaulted (unlike laravel.test's plain ${WWWUSER}): this
            # service passes a `command:`, so start-container's entrypoint
            # takes its `exec gosu $WWWUSER "$@"` branch — an empty/unset
            # WWWUSER there makes gosu treat the first word of the command
            # ("php") as the username to switch to and fail. laravel.test
            # never hits that branch (no command override), so it never
            # needed a fallback. 1337 (not 1000) matches the `sail` user's
            # UID baked into the Sail Dockerfile itself (`useradd -u 1337
            # sail`), which is what actually owns storage/ and
            # bootstrap/cache/ on this host — a generic 1000 default would
            # usermod this container's sail to a different, mismatched uid
            # and get Permission denied writing to storage/.
            WWWUSER: '${WWWUSER:-1337}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        restart: unless-stopped
        # QUEUE_CONNECTION=database: report generation and its follow-up
        # notification mail are dispatched to the `jobs` table and sit there
        # until a worker picks them up — nothing processes them without this
        # service. Runs automatically with `docker compose up` / `sail up`,
        # no manual `artisan queue:work` needed anymore.
        command: php artisan queue:work --tries=3 --backoff=3 --sleep=3
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
